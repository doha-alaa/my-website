<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakaria Verification</title>

    <link rel="stylesheet" href="mystyle.css">
</head>
<body>

<div class="background"></div>

<div class="container">

    <h1 class="title">
        FOOTBALL FAN VERIFICATION SYSTEM
    </h1>

    <p class="subtitle">
        A special investigation has been initiated...
    </p>

    <div class="subject-box">
        FAN DETECTED
        <span>Zakaria</span>
    </div>

    <button id="startBtn">
        BEGIN INVESTIGATION
    </button>

</div>

<!-- Question Screen -->
<div id="questionScreen" class="hidden">

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <div class="question-box">

        <h2 id="questionNumber"></h2>

        <h1 id="questionText"></h1>

        <div id="answers"></div>

    </div>

</div>

<!-- Result Screen -->
<div id="resultScreen" class="hidden">

    <h1 id="analysisText"></h1>

    <div id="finalResult"></div>

    <div id="finalQuestion" style="display:none;">

        <h2>Are you ready?</h2>

        <button id="yesBtn">YES</button>
        <button id="noBtn">NO</button>

    </div>

</div>

<!-- VERIFIED MESSAGE -->
<div id="verifiedMessage" class="hidden">
    <h1> VERIFIED Rajaoui ✔</h1>
</div>

<!-- CINEMATIC SCENE -->
<div id="eagleScene" class="hidden">

    <img src="eagle.png" id="eagleRight">

    <img src="eagle.png" id="eagleLeft">

   <div id="logoContainer">

    <div id="logoCircle">

        <img src="raja-logo.png" id="rajaLogo">

    </div>

    <h1 id="viveText">
        VIVE LE RAJA
    </h1>

</div>

</div>

<audio id="song1">
    <source src="morocco.mp3" type="audio/mpeg">
</audio>

<audio id="song2">
    <source src="dima maghrib.mp3" type="audio/mpeg">
</audio>

<div id="afterScene" class="hidden">

    <h1 id="waitText"></h1>

    <div id="endQuestion" style="display:none;">
        <h2>READY FOR THE END ?</h2>

        <button id="finalYes">YES</button>
    </div>

</div>

<div id="moroccoScene" class="hidden">
    <img src="morocco-flag.gif" id="moroccoFlag">

    <h1 id="moroccoText">
        DIMA MAGHRIB 🇲🇦
    </h1>
</div>
<script src="script.js"></script>

</body>
</html>
